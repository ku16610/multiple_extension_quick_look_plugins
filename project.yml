name: IniPreviewer
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"

targets:
  IniPreviewer:
    type: application
    platform: macOS
    sources:
      - path: IniPreviewer
        excludes:
          - "Main.storyboard"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.IniPreviewer
      INFOPLIST_FILE: IniPreviewer/Info.plist
    dependencies:
      - target: IniPreviewExtension
        embed: true
      - target: ZipPreviewExtension
        embed: true
      - target: DmgPreviewExtension
        embed: true
      - target: SevenZipPreviewExtension
        embed: true
      - target: PePreviewExtension
        embed: true
      - target: IsoPreviewExtension
        embed: true

  IniPreviewExtension:
    type: app-extension
    platform: macOS
    productName: IniPreviewExtension
    sources:
      - IniPreviewExtension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.IniPreviewer.IniPreviewExtension
      INFOPLIST_FILE: IniPreviewExtension/Info.plist
      CODE_SIGN_ENTITLEMENTS: IniPreviewExtension/IniPreviewExtension.entitlements
    dependencies:
      - sdk: QuickLookUI.framework
      - sdk: UniformTypeIdentifiers.framework

  ZipPreviewExtension:
    type: app-extension
    platform: macOS
    productName: ZipPreviewExtension
    sources:
      - ZipPreviewExtension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.IniPreviewer.ZipPreviewExtension
      INFOPLIST_FILE: ZipPreviewExtension/Info.plist
      CODE_SIGN_ENTITLEMENTS: ZipPreviewExtension/ZipPreviewExtension.entitlements
    dependencies:
      - sdk: QuickLookUI.framework

  DmgPreviewExtension:
    type: app-extension
    platform: macOS
    productName: DmgPreviewExtension
    sources:
      - DmgPreviewExtension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.IniPreviewer.DmgPreviewExtension
      INFOPLIST_FILE: DmgPreviewExtension/Info.plist
      CODE_SIGN_ENTITLEMENTS: DmgPreviewExtension/DmgPreviewExtension.entitlements
    dependencies:
      - sdk: QuickLookUI.framework

  SevenZipPreviewExtension:
    type: app-extension
    platform: macOS
    productName: SevenZipPreviewExtension
    sources:
      - SevenZipPreviewExtension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.IniPreviewer.SevenZipPreviewExtension
      INFOPLIST_FILE: SevenZipPreviewExtension/Info.plist
      CODE_SIGN_ENTITLEMENTS: SevenZipPreviewExtension/SevenZipPreviewExtension.entitlements
      SWIFT_OBJC_BRIDGING_HEADER: SevenZipPreviewExtension/SevenZipPreviewExtension-Bridging-Header.h
      OTHER_LDFLAGS: ["-larchive"]
    dependencies:
      - sdk: QuickLookUI.framework

  IsoPreviewExtension:
    type: app-extension
    platform: macOS
    productName: IsoPreviewExtension
    sources:
      - IsoPreviewExtension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.IniPreviewer.IsoPreviewExtension
      INFOPLIST_FILE: IsoPreviewExtension/Info.plist
      CODE_SIGN_ENTITLEMENTS: IsoPreviewExtension/IsoPreviewExtension.entitlements
      SWIFT_OBJC_BRIDGING_HEADER: IsoPreviewExtension/IsoPreviewExtension-Bridging-Header.h
      OTHER_LDFLAGS: ["-larchive"]
    dependencies:
      - sdk: QuickLookUI.framework

  PePreviewExtension:
    type: app-extension
    platform: macOS
    productName: PePreviewExtension
    sources:
      - PePreviewExtension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.IniPreviewer.PePreviewExtension
      INFOPLIST_FILE: PePreviewExtension/Info.plist
      CODE_SIGN_ENTITLEMENTS: PePreviewExtension/PePreviewExtension.entitlements
    dependencies:
      - sdk: QuickLookUI.framework
